<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Fairdeal International — Kolkata's trusted electronics store since 1966">
  <title>Fairdeal International — Kolkata's trusted electronics &amp; home appliance store since 1966</title>
  <defs>
    <linearGradient id="ogBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1929"/>
      <stop offset="100%" stop-color="#0A6E8E"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0%" stop-color="#1FB5E5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1FB5E5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.15" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="#C49A5C" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C49A5C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <g transform="translate(96 110)">
