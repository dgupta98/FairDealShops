  <text x="220" y="218" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" letter-spacing="3" opacity="0.9">INTERNATIONAL · KOLKATA</text>
  <text x="96" y="335" font-family="'Fraunces', Georgia, serif" font-size="86" font-weight="600" fill="#FFFFFF">Trusted by Kolkata</text>
